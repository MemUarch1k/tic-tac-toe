<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крестики-нолики с ботом</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2f3f 0%, #0e1a26 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px 16px 28px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: min(420px, 100%);
            margin: auto;
        }
        h1 {
            text-align: center;
            color: white;
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: 2px;
            margin: 0 0 8px 0;
            text-shadow: 0 4px 10px rgba(0, 200, 255, 0.4);
        }
        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2rem;
        }
        .score-item {
            background: #1e3a4a;
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid #2f5568;
            box-shadow: 0 5px 0 #0b1a22;
        }
        .score-x {
            color: #6ee7f7;
        }
        .score-o {
            color: #ffb87c;
        }
        .score-draw {
            color: #a0a0a0;
        }
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .mode-btn {
            background: #1e3a4a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b1a22;
            transition: 0.1s ease;
            flex: 1;
        }
        .mode-btn.active {
            background: #31738f;
            box-shadow: 0 5px 0 #124052;
            transform: translateY(-2px);
        }
        .mode-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0b1a22;
        }
        .status {
            background: #1e3a4a;
            color: #b3e9ff;
            text-align: center;
            padding: 14px 10px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 5px #0b1c26, 0 8px 12px rgba(0, 0, 0, 0.4);
            border: 1px solid #2f5568;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            aspect-ratio: 1 / 1;
            margin-bottom: 28px;
        }
        .cell {
            background: #1f3e4b;
            border-radius: 28px;
            box-shadow: 0 10px 0 #0b1a22, 0 8px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 400;
            color: white;
            transition: all 0.07s ease;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .cell:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0b1a22, 0 8px 15px rgba(0, 0, 0, 0.6);
        }
        .cell.x-move {
            color: #6ee7f7;
            text-shadow: 0 0 20px #00ccff, 0 0 40px #0088aa;
        }
        .cell.o-move {
            color: #ffb87c;
            text-shadow: 0 0 20px #ff9500, 0 0 40px #aa5500;
        }
        .reset-btn {
            width: 100%;
            padding: 18px 16px;
            border-radius: 60px;
            border: none;
            background: #31738f;
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 12px 0 #124052, 0 8px 20px #00000080;
            transition: 0.1s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 16px;
        }
        .reset-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #124052, 0 8px 20px #00000080;
        }
        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .diff-btn {
            background: #152b36;
            color: #8ab3cf;
            border: 1px solid #2f5568;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }
        .diff-btn.active {
            background: #2a5f7a;
            color: white;
            border-color: #6ee7f7;
        }
        .first-move {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        .first-move-btn {
            background: #1e3a4a;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #0b1a22;
            transition: 0.1s ease;
            flex: 1;
        }
        .first-move-btn.active {
            background: #31738f;
            box-shadow: 0 3px 0 #124052;
        }
        footer {
            text-align: center;
            color: #366277;
            margin-top: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>❌ крестики с ботом ⭕</h1>
        
        <div class="scoreboard">
            <div class="score-item"><span class="score-x">❌ X</span> <span id="scoreX">0</span></div>
            <div class="score-item"><span class="score-draw">🤝</span> <span id="scoreDraw">0</span></div>
            <div class="score-item"><span class="score-o">⭕ O</span> <span id="scoreO">0</span></div>
        </div>
        
        <div class="mode-selector">
            <button class="mode-btn" id="mode2p">👥 2 игрока</button>
            <button class="mode-btn active" id="modeBot">🤖 Против бота</button>
        </div>
        
        <div class="difficulty-selector" id="difficultyPanel">
            <button class="diff-btn" data-diff="easy">🌱 Легкий</button>
            <button class="diff-btn active" data-diff="medium">🌿 Средний</button>
            <button class="diff-btn" data-diff="hard">🌲 Сложный</button>
        </div>
        
        <div class="first-move" id="firstMovePanel">
            <button class="first-move-btn" data-first="player">👤 Игрок первый</button>
            <button class="first-move-btn active" data-first="bot">🤖 Бот первый</button>
            <button class="first-move-btn" data-first="random">🎲 Случайно</button>
        </div>
        
        <div class="status" id="status">Загрузка...</div>
        
        <div class="board" id="board"></div>
        
        <button class="reset-btn" id="reset">⟳ новая игра</button>
        <footer>⚡ счёт сохраняется в браузере</footer>
    </div>

    <script>
        (function() {
            // ---------- Состояние игры ----------
            let board = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let gameActive = true;
            let mode = 'bot'; // '2p' или 'bot'
            let difficulty = 'medium'; // 'easy', 'medium', 'hard'
            let firstMove = 'bot'; // 'player', 'bot', 'random'
            
            // Счётчик побед
            let scores = {
                X: 0,
                O: 0,
                draw: 0
            };
            
            // Загружаем счёт из localStorage
            function loadScores() {
                const saved = localStorage.getItem('ticTacToeScores');
                if (saved) {
                    try {
                        scores = JSON.parse(saved);
                    } catch (e) {
                        console.log('Ошибка загрузки счёта');
                    }
                }
                updateScoreDisplay();
            }
            
            // Сохраняем счёт в localStorage
            function saveScores() {
                localStorage.setItem('ticTacToeScores', JSON.stringify(scores));
                updateScoreDisplay();
            }
            
            // Обновляем отображение счёта
            function updateScoreDisplay() {
                document.getElementById('scoreX').innerText = scores.X;
                document.getElementById('scoreO').innerText = scores.O;
                document.getElementById('scoreDraw').innerText = scores.draw;
            }
            
            const statusEl = document.getElementById('status');
            const boardEl = document.getElementById('board');
            const mode2p = document.getElementById('mode2p');
            const modeBot = document.getElementById('modeBot');
            const resetBtn = document.getElementById('reset');
            const difficultyPanel = document.getElementById('difficultyPanel');
            const firstMovePanel = document.getElementById('firstMovePanel');
            const diffBtns = document.querySelectorAll('.diff-btn');
            const firstMoveBtns = document.querySelectorAll('.first-move-btn');
            
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];

            // Загружаем счёт при старте
            loadScores();

            // ---------- Проверка победителя ----------
            function getWinner() {
                for (let p of winPatterns) {
                    const [a,b,c] = p;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return board[a];
                    }
                }
                return board.includes('') ? null : 'draw';
            }

            // ---------- Обработка конца игры ----------
            function handleGameEnd(winner) {
                if (winner === 'X') {
                    scores.X++;
                    statusEl.innerText = '❌ X победил!';
                } else if (winner === 'O') {
                    scores.O++;
                    statusEl.innerText = '⭕ O победил!';
                } else if (winner === 'draw') {
                    scores.draw++;
                    statusEl.innerText = '🤝 ничья!';
                }
                gameActive = false;
                saveScores();
            }

            // ---------- Отрисовка доски ----------
            function renderBoard() {
                let html = '';
                for (let i = 0; i < 9; i++) {
                    let cellClass = 'cell';
                    if (board[i] === 'X') cellClass += ' x-move';
                    if (board[i] === 'O') cellClass += ' o-move';
                    html += `<div class="${cellClass}" data-index="${i}">${board[i]}</div>`;
                }
                boardEl.innerHTML = html;
                
                const winner = getWinner();
                if (winner) {
                    handleGameEnd(winner);
                } else {
                    statusEl.innerText = `ходит ${currentPlayer}`;
                    gameActive = true;
                    
                    // Если режим бота и сейчас ходит бот
                    if (mode === 'bot' && currentPlayer === 'O' && gameActive) {
                        setTimeout(() => botMove(), 400);
                    }
                }
            }

            // ---------- Ход игрока ----------
            function handleMove(index) {
                if (!gameActive) return;
                if (board[index] !== '') return;
                
                // В режиме бота игрок всегда X, бот O
                if (mode === 'bot' && currentPlayer !== 'X') return;
                
                // Делаем ход
                board[index] = currentPlayer;
                
                // Проверяем победу
                const winner = getWinner();
                if (winner) {
                    handleGameEnd(winner);
                    renderBoard();
                    return;
                }
                
                // Меняем игрока
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                renderBoard();
            }

            // ---------- Умный бот (почти непобедимый) ----------
            function getBestMove(boardArr, botSymbol) {
                const playerSymbol = botSymbol === 'O' ? 'X' : 'O';
                
                // 1. Проверить, может ли бот выиграть
                for (let i = 0; i < 9; i++) {
                    if (boardArr[i] === '') {
                        boardArr[i] = botSymbol;
                        if (checkWin(boardArr, botSymbol)) {
                            boardArr[i] = '';
                            return i;
                        }
                        boardArr[i] = '';
                    }
                }
                
                // 2. Проверить, может ли игрок выиграть (заблокировать)
                for (let i = 0; i < 9; i++) {
                    if (boardArr[i] === '') {
                        boardArr[i] = playerSymbol;
                        if (checkWin(boardArr, playerSymbol)) {
                            boardArr[i] = '';
                            return i;
                        }
                        boardArr[i] = '';
                    }
                }
                
                // 3. Занять центр
                if (boardArr[4] === '') return 4;
                
                // 4. Занять углы
                const corners = [0, 2, 6, 8];
                const availableCorners = corners.filter(i => boardArr[i] === '');
                if (availableCorners.length > 0) {
                    return availableCorners[Math.floor(Math.random() * availableCorners.length)];
                }
                
                // 5. Любая свободная клетка
                const empty = boardArr.reduce((acc, cell, idx) => {
                    if (cell === '') acc.push(idx);
                    return acc;
                }, []);
                
                return empty.length > 0 ? empty[0] : -1;
            }
            
            // ---------- Ход бота ----------
            function botMove() {
                if (!gameActive || currentPlayer !== 'O') return;
                
                let moveIndex = -1;
                const boardCopy = [...board];
                
                if (difficulty === 'easy') {
                    // Легкий: случайный ход
                    const empty = boardCopy.reduce((acc, cell, idx) => {
                        if (cell === '') acc.push(idx);
                        return acc;
                    }, []);
                    
                    if (empty.length > 0) {
                        moveIndex = empty[Math.floor(Math.random() * empty.length)];
                    }
                }
                else if (difficulty === 'medium') {
                    // Средний: 30% умный, 70% случайный
                    if (Math.random() < 0.3) {
                        moveIndex = getBestMove(boardCopy, 'O');
                    }
                    
                    if (moveIndex === -1) {
                        const empty = boardCopy.reduce((acc, cell, idx) => {
                            if (cell === '') acc.push(idx);
                            return acc;
                        }, []);
                        if (empty.length > 0) {
                            moveIndex = empty[Math.floor(Math.random() * empty.length)];
                        }
                    }
                }
                else { // hard
                    // Сложный: умный ход + немного случайности, чтобы не было скучно
                    if (Math.random() < 0.9) {
                        moveIndex = getBestMove(boardCopy, 'O');
                    }
                    
                    if (moveIndex === -1) {
                        const empty = boardCopy.reduce((acc, cell, idx) => {
                            if (cell === '') acc.push(idx);
                            return acc;
                        }, []);
                        if (empty.length > 0) {
                            moveIndex = empty[Math.floor(Math.random() * empty.length)];
                        }
                    }
                }
                
                if (moveIndex !== -1 && moveIndex < 9) {
                    board[moveIndex] = 'O';
                    
                    const winner = getWinner();
                    if (winner) {
                        handleGameEnd(winner);
                    } else {
                        currentPlayer = 'X';
                    }
                    
                    renderBoard();
                }
            }
            
            function checkWin(boardArr, symbol) {
                for (let p of winPatterns) {
                    const [a,b,c] = p;
                    if (boardArr[a] === symbol && boardArr[b] === symbol && boardArr[c] === symbol) {
                        return true;
                    }
                }
                return false;
            }

            // ---------- Сброс игры ----------
            function resetGame() {
                board = ['', '', '', '', '', '', '', '', ''];
                
                // Определяем, кто ходит первый
                if (mode === 'bot') {
                    if (firstMove === 'player') {
                        currentPlayer = 'X';
                    } else if (firstMove === 'bot') {
                        currentPlayer = 'O';
                    } else { // random
                        currentPlayer = Math.random() < 0.5 ? 'X' : 'O';
                    }
                } else {
                    currentPlayer = 'X'; // в режиме 2 игроков всегда X первый
                }
                
                gameActive = true;
                renderBoard();
            }

            // ---------- Переключение режимов ----------
            mode2p.addEventListener('click', () => {
                mode = '2p';
                mode2p.classList.add('active');
                modeBot.classList.remove('active');
                difficultyPanel.style.display = 'flex';
                firstMovePanel.style.display = 'none';
                resetGame();
            });
            
            modeBot.addEventListener('click', () => {
                mode = 'bot';
                modeBot.classList.add('active');
                mode2p.classList.remove('active');
                difficultyPanel.style.display = 'flex';
                firstMovePanel.style.display = 'flex';
                resetGame();
            });
            
            // Сложность
            diffBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    diffBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    difficulty = btn.dataset.diff;
                });
            });
            
            // Кто первый ходит
            firstMoveBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    firstMoveBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    firstMove = btn.dataset.first;
                });
            });

            // ---------- События ----------
            boardEl.addEventListener('click', (e) => {
                const cell = e.target.closest('.cell');
                if (!cell) return;
                const index = cell.dataset.index;
                if (index !== undefined) handleMove(parseInt(index));
            });

            resetBtn.addEventListener('click', resetGame);

            // Старт
            difficultyPanel.style.display = 'flex';
            firstMovePanel.style.display = 'flex';
            resetGame();
        })();
    </script>
</body>
</html>
