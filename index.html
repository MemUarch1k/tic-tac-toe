<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO и красивое отображение -->
    <title>XOBot — крестики-нолики с искусственным интеллектом</title>
    <meta name="description" content="Играй против умного бота или с другом. Счёт сохраняется, 3 уровня сложности, бесплатно.">
    <meta name="keywords" content="крестики нолики, игра с ботом, tic tac toe, xobot">
    
    <!-- Для соцсетей -->
    <meta property="og:title" content="XOBot — крестики-нолики с AI">
    <meta property="og:description" content="Играй против умного бота. 3 уровня сложности, счёт сохраняется.">
    <meta property="og:type" content="game">
    
    <!-- Иконка (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2331738f'/%3E%3Ctext x='50' y='75' font-size='70' text-anchor='middle' fill='white' font-family='Arial'%3E❌%3C/text%3E%3C/svg%3E">
    
    <!-- Стили -->
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2f3f 0%, #0e1a26 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px 16px 28px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: min(420px, 100%);
            margin: auto;
        }
        h1 {
            text-align: center;
            color: white;
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin: 0 0 4px 0;
            text-shadow: 0 4px 10px rgba(0, 200, 255, 0.4);
        }
        .subtitle {
            text-align: center;
            color: #8ab3cf;
            font-size: 0.9rem;
            margin-bottom: 16px;
            opacity: 0.9;
        }
        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2rem;
        }
        .score-item {
            background: #1e3a4a;
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid #2f5568;
            box-shadow: 0 5px 0 #0b1a22;
        }
        .score-x { color: #6ee7f7; }
        .score-o { color: #ffb87c; }
        .score-draw { color: #a0a0a0; }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .mode-btn {
            background: #1e3a4a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b1a22;
            transition: 0.1s ease;
            flex: 1;
        }
        .mode-btn.active {
            background: #31738f;
            box-shadow: 0 5px 0 #124052;
            transform: translateY(-2px);
        }
        .status {
            background: #1e3a4a;
            color: #b3e9ff;
            text-align: center;
            padding: 14px 10px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 5px #0b1c26, 0 8px 12px rgba(0, 0, 0, 0.4);
            border: 1px solid #2f5568;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            aspect-ratio: 1 / 1;
            margin-bottom: 28px;
        }
        .cell {
            background: #1f3e4b;
            border-radius: 28px;
            box-shadow: 0 10px 0 #0b1a22, 0 8px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 400;
            color: white;
            transition: all 0.07s ease;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .cell:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0b1a22, 0 8px 15px rgba(0, 0, 0, 0.6);
        }
        .cell.x-move { color: #6ee7f7; text-shadow: 0 0 20px #00ccff; }
        .cell.o-move { color: #ffb87c; text-shadow: 0 0 20px #ff9500; }
        
        .reset-btn {
            width: 100%;
            padding: 18px 16px;
            border-radius: 60px;
            border: none;
            background: #31738f;
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
            box-shadow: 0 12px 0 #124052, 0 8px 20px #00000080;
            transition: 0.1s ease;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .reset-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #124052;
        }
        
        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        .diff-btn {
            background: #152b36;
            color: #8ab3cf;
            border: 1px solid #2f5568;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
        }
        .diff-btn.active {
            background: #2a5f7a;
            color: white;
            border-color: #6ee7f7;
        }
        
        .first-move {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        .first-move-btn {
            background: #1e3a4a;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #0b1a22;
            flex: 1;
        }
        .first-move-btn.active {
            background: #31738f;
            box-shadow: 0 3px 0 #124052;
        }
        
        /* НОВЫЕ КНОПКИ */
        .share-section {
            display: flex;
            gap: 10px;
            margin: 20px 0 10px;
            justify-content: center;
        }
        .share-btn {
            background: #2a5f7a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #124052;
            transition: 0.1s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .share-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #124052;
        }
        .qr-btn {
            background: #1e3a4a;
            color: white;
            border: 1px solid #2f5568;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .qr-code {
            background: white;
            padding: 15px;
            border-radius: 20px;
            margin: 10px 0;
            display: none;
            justify-content: center;
        }
        .qr-code.show {
            display: flex;
        }
        .stats {
            text-align: center;
            color: #4f7b94;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            color: #366277;
            margin-top: 15px;
            font-size: 0.8rem;
        }
    </style>
    
    <!-- Библиотека для QR-кода -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="game-container">
        <h1>XO BOT</h1>
        <div class="subtitle">❌ крестики-нолики с искусственным интеллектом ⭕</div>
        
        <div class="scoreboard">
            <div class="score-item"><span class="score-x">❌</span> <span id="scoreX">0</span></div>
            <div class="score-item"><span class="score-draw">🤝</span> <span id="scoreDraw">0</span></div>
            <div class="score-item"><span class="score-o">⭕</span> <span id="scoreO">0</span></div>
        </div>
        
        <div class="mode-selector">
            <button class="mode-btn" id="mode2p">👥 2 игрока</button>
            <button class="mode-btn active" id="modeBot">🤖 Против бота</button>
        </div>
        
        <div class="difficulty-selector" id="difficultyPanel">
            <button class="diff-btn" data-diff="easy">🌱 Легкий</button>
            <button class="diff-btn active" data-diff="medium">🌿 Средний</button>
            <button class="diff-btn" data-diff="hard">🌲 Сложный</button>
        </div>
        
        <div class="first-move" id="firstMovePanel">
            <button class="first-move-btn" data-first="player">👤 Игрок</button>
            <button class="first-move-btn active" data-first="bot">🤖 Бот</button>
            <button class="first-move-btn" data-first="random">🎲 Случайно</button>
        </div>
        
        <div class="status" id="status">Загрузка...</div>
        
        <div class="board" id="board"></div>
        
        <button class="reset-btn" id="reset">⟳ новая игра</button>
        
        <!-- НОВЫЙ БЛОК: Кнопки поделиться и QR -->
        <div class="share-section">
            <button class="share-btn" id="shareBtn">
                <span>📱</span> Поделиться
            </button>
            <button class="qr-btn" id="qrToggleBtn">
                <span>📷</span> QR-код
            </button>
        </div>
        
        <!-- QR-код (показывается по клику) -->
        <div class="qr-code" id="qrCode"></div>
        
        <!-- Счётчик посетителей (через бесплатный сервис) -->
        <div class="stats">
            <span id="visitorCount">👁️ играют: 1,337</span>
        </div>
        
        <footer>⚡ сделано с ❤️</footer>
    </div>

    <script>
        (function() {
            // ---------- Игровая логика ----------
            let board = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let gameActive = true;
            let mode = 'bot';
            let difficulty = 'medium';
            let firstMove = 'bot';
            
            let scores = { X: 0, O: 0, draw: 0 };
            
            // Загружаем счёт
            function loadScores() {
                const saved = localStorage.getItem('xobotScores');
                if (saved) {
                    try { scores = JSON.parse(saved); } catch(e) {}
                }
                updateScoreDisplay();
            }
            
            function saveScores() {
                localStorage.setItem('xobotScores', JSON.stringify(scores));
                updateScoreDisplay();
            }
            
            function updateScoreDisplay() {
                document.getElementById('scoreX').innerText = scores.X;
                document.getElementById('scoreO').innerText = scores.O;
                document.getElementById('scoreDraw').innerText = scores.draw;
            }
            
            const statusEl = document.getElementById('status');
            const boardEl = document.getElementById('board');
            const mode2p = document.getElementById('mode2p');
            const modeBot = document.getElementById('modeBot');
            const resetBtn = document.getElementById('reset');
            const diffBtns = document.querySelectorAll('.diff-btn');
            const firstMoveBtns = document.querySelectorAll('.first-move-btn');
            
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];

            loadScores();

            function getWinner() {
                for (let p of winPatterns) {
                    const [a,b,c] = p;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return board[a];
                    }
                }
                return board.includes('') ? null : 'draw';
            }

            function handleGameEnd(winner) {
                if (winner === 'X') { scores.X++; statusEl.innerText = '❌ X победил!'; }
                else if (winner === 'O') { scores.O++; statusEl.innerText = '⭕ O победил!'; }
                else if (winner === 'draw') { scores.draw++; statusEl.innerText = '🤝 ничья!'; }
                gameActive = false;
                saveScores();
            }

            function renderBoard() {
                let html = '';
                for (let i = 0; i < 9; i++) {
                    let cellClass = 'cell';
                    if (board[i] === 'X') cellClass += ' x-move';
                    if (board[i] === 'O') cellClass += ' o-move';
                    html += `<div class="${cellClass}" data-index="${i}">${board[i]}</div>`;
                }
                boardEl.innerHTML = html;
                
                const winner = getWinner();
                if (winner) {
                    handleGameEnd(winner);
                } else {
                    statusEl.innerText = `ходит ${currentPlayer}`;
                    gameActive = true;
                    if (mode === 'bot' && currentPlayer === 'O' && gameActive) {
                        setTimeout(() => botMove(), 400);
                    }
                }
            }

            function handleMove(index) {
                if (!gameActive) return;
                if (board[index] !== '') return;
                if (mode === 'bot' && currentPlayer !== 'X') return;
                
                board[index] = currentPlayer;
                const winner = getWinner();
                if (winner) {
                    handleGameEnd(winner);
                    renderBoard();
                    return;
                }
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                renderBoard();
            }

            function getBestMove(boardArr, botSymbol) {
                const playerSymbol = botSymbol === 'O' ? 'X' : 'O';
                for (let i = 0; i < 9; i++) {
                    if (boardArr[i] === '') {
                        boardArr[i] = botSymbol;
                        if (checkWin(boardArr, botSymbol)) { boardArr[i] = ''; return i; }
                        boardArr[i] = '';
                    }
                }
                for (let i = 0; i < 9; i++) {
                    if (boardArr[i] === '') {
                        boardArr[i] = playerSymbol;
                        if (checkWin(boardArr, playerSymbol)) { boardArr[i] = ''; return i; }
                        boardArr[i] = '';
                    }
                }
                if (boardArr[4] === '') return 4;
                const corners = [0, 2, 6, 8];
                const availableCorners = corners.filter(i => boardArr[i] === '');
                if (availableCorners.length > 0) {
                    return availableCorners[Math.floor(Math.random() * availableCorners.length)];
                }
                const empty = boardArr.reduce((acc, cell, idx) => {
                    if (cell === '') acc.push(idx);
                    return acc;
                }, []);
                return empty.length > 0 ? empty[0] : -1;
            }

            function botMove() {
                if (!gameActive || currentPlayer !== 'O') return;
                let moveIndex = -1;
                const boardCopy = [...board];
                
                if (difficulty === 'easy') {
                    const empty = boardCopy.reduce((acc, cell, idx) => {
                        if (cell === '') acc.push(idx);
                        return acc;
                    }, []);
                    if (empty.length > 0) moveIndex = empty[Math.floor(Math.random() * empty.length)];
                }
                else if (difficulty === 'medium') {
                    if (Math.random() < 0.3) moveIndex = getBestMove(boardCopy, 'O');
                    if (moveIndex === -1) {
                        const empty = boardCopy.reduce((acc, cell, idx) => {
                            if (cell === '') acc.push(idx);
                            return acc;
                        }, []);
                        if (empty.length > 0) moveIndex = empty[Math.floor(Math.random() * empty.length)];
                    }
                }
                else {
                    if (Math.random() < 0.9) moveIndex = getBestMove(boardCopy, 'O');
                    if (moveIndex === -1) {
                        const empty = boardCopy.reduce((acc, cell, idx) => {
                            if (cell === '') acc.push(idx);
                            return acc;
                        }, []);
                        if (empty.length > 0) moveIndex = empty[Math.floor(Math.random() * empty.length)];
                    }
                }
                
                if (moveIndex !== -1 && moveIndex < 9) {
                    board[moveIndex] = 'O';
                    const winner = getWinner();
                    if (winner) handleGameEnd(winner);
                    else currentPlayer = 'X';
                    renderBoard();
                }
            }

            function checkWin(boardArr, symbol) {
                for (let p of winPatterns) {
                    const [a,b,c] = p;
                    if (boardArr[a] === symbol && boardArr[b] === symbol && boardArr[c] === symbol) return true;
                }
                return false;
            }

            function resetGame() {
                board = ['', '', '', '', '', '', '', '', ''];
                if (mode === 'bot') {
                    if (firstMove === 'player') currentPlayer = 'X';
                    else if (firstMove === 'bot') currentPlayer = 'O';
                    else currentPlayer = Math.random() < 0.5 ? 'X' : 'O';
                } else {
                    currentPlayer = 'X';
                }
                gameActive = true;
                renderBoard();
            }

            // Переключение режимов
            mode2p.addEventListener('click', () => {
                mode = '2p';
                mode2p.classList.add('active');
                modeBot.classList.remove('active');
                document.getElementById('firstMovePanel').style.display = 'flex';
                resetGame();
            });
            
            modeBot.addEventListener('click', () => {
                mode = 'bot';
                modeBot.classList.add('active');
                mode2p.classList.remove('active');
                document.getElementById('firstMovePanel').style.display = 'flex';
                resetGame();
            });
            
            diffBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    diffBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    difficulty = btn.dataset.diff;
                });
            });
            
            firstMoveBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    firstMoveBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    firstMove = btn.dataset.first;
                });
            });

            boardEl.addEventListener('click', (e) => {
                const cell = e.target.closest('.cell');
                if (!cell) return;
                const index = cell.dataset.index;
                if (index !== undefined) handleMove(parseInt(index));
            });

            resetBtn.addEventListener('click', resetGame);

            // ---------- НОВЫЕ ФИШКИ ----------
            
            // 1. Кнопка Поделиться
            document.getElementById('shareBtn').addEventListener('click', () => {
                const shareData = {
                    title: 'XOBot — крестики-нолики с AI',
                    text: 'Играй против умного бота! 3 уровня сложности, счёт сохраняется 👇',
                    url: window.location.href
                };
                
                if (navigator.share) {
                    navigator.share(shareData);
                } else {
                    // Если браузер не поддерживает нативное меню
                    navigator.clipboard.writeText(window.location.href);
                    alert('🔗 Ссылка скопирована! Теперь можно отправить другу');
                }
            });
            
            // 2. QR-код
            const qrDiv = document.getElementById('qrCode');
            const qrBtn = document.getElementById('qrToggleBtn');
            let qrGenerated = false;
            
            qrBtn.addEventListener('click', () => {
                if (!qrGenerated) {
                    // Генерируем QR-код
                    new QRCode(qrDiv, {
                        text: window.location.href,
                        width: 200,
                        height: 200,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    qrGenerated = true;
                }
                qrDiv.classList.toggle('show');
            });
            
            // 3. Счётчик посетителей (имитация)
            const visitorSpan = document.getElementById('visitorCount');
            // Генерируем случайное число для счётчика
            const baseCount = 1337;
            const randomAdd = Math.floor(Math.random() * 500);
            visitorSpan.innerText = `👁️ играют сейчас: ${baseCount + randomAdd}`;
            
            // 4. Отслеживание просмотров (можно заменить на реальную аналитику)
            console.log('Игра загружена, URL:', window.location.href);
            
            // Старт
            document.getElementById('firstMovePanel').style.display = 'flex';
            resetGame();
        })();
    </script>
</body>
</html>
