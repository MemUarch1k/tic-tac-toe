<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Tic-Tac-Toe</title>
    <style>
        /* ========== ИСПРАВЛЕНИЕ ПУНКТОВ 3 и 4 ========== */
        /* Убираем прокрутку, выделение, контекстное меню */
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #0a0c12;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* ========== ОСНОВНОЙ ДИЗАЙН ========== */
        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 95vw;
            max-height: 95vh;
            overflow: auto;
        }
        
        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }
        
        .score-card {
            background: #0f1117;
            border-radius: 24px;
            padding: 10px 20px;
            text-align: center;
            flex: 1;
        }
        
        .score-label {
            color: #5a6e8a;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .score-value {
            color: #2ecc71;
            font-size: 28px;
            font-weight: bold;
        }
        
        .best .score-value {
            color: #f39c12;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, minmax(80px, 100px));
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .cell {
            aspect-ratio: 1 / 1;
            background: #1a1f2a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s linear;
            color: #c0d0e6;
        }
        
        .cell:hover {
            background: #2a2f3e;
            transform: scale(0.98);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 0 #0b0e12;
        }
        
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }
        
        .status {
            text-align: center;
            color: #e67e22;
            font-weight: bold;
            margin-top: 10px;
            font-size: 16px;
        }
        
        @media (max-width: 500px) {
            .board { grid-template-columns: repeat(3, minmax(70px, 85px)); gap: 8px; }
            .cell { font-size: 36px; }
            button { font-size: 12px; padding: 8px 16px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="score-board">
            <div class="score-card"><div class="score-label">ПОБЕДЫ</div><div class="score-value" id="winsCount">0</div></div>
            <div class="score-card best"><div class="score-label">РЕКОРД БОТА</div><div class="score-value" id="botWinsCount">0</div></div>
        </div>
        
        <div class="board" id="board"></div>
        
        <div class="controls">
            <button id="newGameBtn">🔄 НОВАЯ ИГРА</button>
            <button id="shareBtn">📤 ПОДЕЛИТЬСЯ</button>
        </div>
        <div class="status" id="gameStatus">▶ ИГРА</div>
    </div>
</div>

<script src="https://yandex.ru/games/sdk/v2"></script>
<script>
    // ========== ПРАВИЛЬНАЯ ИНИЦИАЛИЗАЦИЯ SDK ==========
    let ysdk = null;
    let currentLanguage = 'ru';
    let gameActive = true;
    let gamePaused = false;
    
    // Функция для перевода (пример)
    function t(key) {
        const translations = {
            'game_status_playing': { ru: '▶ ИГРА', en: '▶ GAME', tr: '▶ OYUN' },
            'game_status_win': { ru: '🏆 ПОБЕДА!', en: '🏆 YOU WIN!', tr: '🏆 KAZANDIN!' },
            'game_status_lose': { ru: '💀 ПОРАЖЕНИЕ', en: '💀 DEFEAT', tr: '💀 KAYBETTIN' },
            'game_status_draw': { ru: '🤝 НИЧЬЯ', en: '🤝 DRAW', tr: '🤝 BERABERLİK' }
        };
        return translations[key]?.[currentLanguage] || translations[key]?.['ru'] || key;
    }
    
    async function initSDK() {
        try {
            ysdk = await YaGames.init();
            
            // 1. Автоопределение языка (ПУНКТ 6)
            const env = await ysdk.getEnvironment();
            currentLanguage = env.i18n.lang;
            console.log('Язык игрока:', currentLanguage);
            
            // 2. Сообщаем, что игра загрузилась (ПУНКТ 2)
            if (ysdk.features.LoadingAPI) {
                ysdk.features.LoadingAPI.ready();
            }
            
            // 3. Настройка Gameplay API (ПУНКТ 7)
            window.startGameplay = () => {
                if (ysdk.features.GameplayAPI && gameActive && !gamePaused) {
                    ysdk.features.GameplayAPI.start();
                }
            };
            window.stopGameplay = () => {
                if (ysdk.features.GameplayAPI) {
                    ysdk.features.GameplayAPI.stop();
                }
            };
            
            // Запускаем геймплей, если игра активна
            if (gameActive && !gamePaused) {
                window.startGameplay();
            }
            
            // Обработка видимости вкладки
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    window.stopGameplay();
                } else if (gameActive && !gamePaused) {
                    window.startGameplay();
                }
            });
            
        } catch (error) {
            console.error('SDK ошибка:', error);
        }
    }
    
    // Отключаем контекстное меню и выделение (ПУНКТ 4)
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('dragstart', (e) => e.preventDefault());
    
    // ========== ОСНОВНОЙ КОД ИГРЫ ==========
    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameEnded = false;
    let wins = 0;
    let botWins = 0;
    let currentMode = 'bot'; // 'bot' or 'twoPlayer'
    let botDifficulty = 'medium'; // 'easy', 'medium', 'hard'
    
    const boardEl = document.getElementById('board');
    const winsCountSpan = document.getElementById('winsCount');
    const botWinsCountSpan = document.getElementById('botWinsCount');
    const gameStatusSpan = document.getElementById('gameStatus');
    
    function loadScores() {
        try {
            const savedWins = localStorage.getItem('ttt_wins');
            const savedBotWins = localStorage.getItem('ttt_bot_wins');
            if (savedWins) wins = parseInt(savedWins);
            if (savedBotWins) botWins = parseInt(savedBotWins);
            winsCountSpan.innerText = wins;
            botWinsCountSpan.innerText = botWins;
        } catch(e) {}
    }
    
    function saveScores() {
        localStorage.setItem('ttt_wins', wins);
        localStorage.setItem('ttt_bot_wins', botWins);
        winsCountSpan.innerText = wins;
        botWinsCountSpan.innerText = botWins;
    }
    
    function checkWinner(boardArr) {
        const lines = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        for (let line of lines) {
            const [a,b,c] = line;
            if (boardArr[a] && boardArr[a] === boardArr[b] && boardArr[a] === boardArr[c]) {
                return boardArr[a];
            }
        }
        if (boardArr.every(cell => cell !== null)) return 'draw';
        return null;
    }
    
    function updateStatus() {
        if (gameEnded) return;
        if (currentPlayer === 'X') {
            gameStatusSpan.innerHTML = t('game_status_playing');
        } else {
            gameStatusSpan.innerHTML = '🤖 ХОД БОТА';
        }
    }
    
    function endGame(winner) {
        gameEnded = true;
        gameActive = false;
        window.stopGameplay(); // Останавливаем геймплей (ПУНКТ 7)
        
        if (winner === 'X') {
            wins++;
            saveScores();
            gameStatusSpan.innerHTML = t('game_status_win');
        } else if (winner === 'O') {
            botWins++;
            saveScores();
            gameStatusSpan.innerHTML = t('game_status_lose');
        } else if (winner === 'draw') {
            gameStatusSpan.innerHTML = t('game_status_draw');
        }
        
        setTimeout(() => {
            if (ysdk && ysdk.features.GameplayAPI) {
                window.startGameplay();
            }
        }, 500);
    }
    
    function makeMove(index) {
        if (gameEnded) return false;
        if (board[index] !== null) return false;
        if (currentMode === 'bot' && currentPlayer !== 'X') return false;
        
        board[index] = currentPlayer;
        renderBoard();
        
        const winner = checkWinner(board);
        if (winner) {
            endGame(winner);
            return true;
        }
        
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        updateStatus();
        
        if (currentMode === 'bot' && currentPlayer === 'O' && !gameEnded) {
            setTimeout(() => botMove(), 300);
        }
        return true;
    }
    
    function botMove() {
        if (gameEnded) return;
        if (currentPlayer !== 'O') return;
        
        let move = -1;
        
        if (botDifficulty === 'easy') {
            let empty = board.reduce((arr, cell, idx) => {
                if (cell === null) arr.push(idx);
                return arr;
            }, []);
            if (empty.length > 0) {
                move = empty[Math.floor(Math.random() * empty.length)];
            }
        } else {
            move = getBestMove(board, 'O');
        }
        
        if (move !== -1) {
            board[move] = 'O';
            renderBoard();
            const winner = checkWinner(board);
            if (winner) {
                endGame(winner);
                return;
            }
            currentPlayer = 'X';
            updateStatus();
        }
    }
    
    function getBestMove(boardArr, player) {
        const opponent = player === 'O' ? 'X' : 'O';
        
        for (let i = 0; i < 9; i++) {
            if (boardArr[i] === null) {
                boardArr[i] = player;
                if (checkWinner(boardArr) === player) {
                    boardArr[i] = null;
                    return i;
                }
                boardArr[i] = null;
            }
        }
        
        for (let i = 0; i < 9; i++) {
            if (boardArr[i] === null) {
                boardArr[i] = opponent;
                if (checkWinner(boardArr) === opponent) {
                    boardArr[i] = null;
                    return i;
                }
                boardArr[i] = null;
            }
        }
        
        let empty = [];
        for (let i = 0; i < 9; i++) {
            if (boardArr[i] === null) empty.push(i);
        }
        if (empty.length > 0) {
            return empty[Math.floor(Math.random() * empty.length)];
        }
        return -1;
    }
    
    function renderBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = board[i] || '';
            if (board[i] === 'X') cell.style.color = '#2ecc71';
            if (board[i] === 'O') cell.style.color = '#e74c3c';
            cell.addEventListener('click', (function(idx) {
                return function() { makeMove(idx); };
            })(i));
            boardEl.appendChild(cell);
        }
    }
    
    function newGame() {
        board = Array(9).fill(null);
        currentPlayer = 'X';
        gameEnded = false;
        gameActive = true;
        gamePaused = false;
        renderBoard();
        updateStatus();
        
        if (ysdk && ysdk.features.GameplayAPI) {
            window.startGameplay();
        }
        
        if (currentMode === 'bot' && currentPlayer === 'O') {
            setTimeout(() => botMove(), 300);
        }
    }
    
    function shareGame() {
        if (ysdk && ysdk.features.Share) {
            ysdk.features.Share.share({
                message: 'Сыграем в Крестики-нолики?'
            });
        } else {
            alert('Скопируй ссылку: https://memuarch1k.github.io/tic-tac-toe/');
        }
    }
    
    function setMode(mode) {
        currentMode = mode;
        newGame();
    }
    
    function setDifficulty(diff) {
        botDifficulty = diff;
        newGame();
    }
    
    document.getElementById('newGameBtn').addEventListener('click', newGame);
    document.getElementById('shareBtn').addEventListener('click', shareGame);
    
    loadScores();
    initSDK();
    newGame();
</script>
</body>
</html>
