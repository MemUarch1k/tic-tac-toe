<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Tic-Tac-Toe</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #0a0c12;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 95vw;
            max-height: 95vh;
            overflow: auto;
        }
        
        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #c0d0e6;
            font-size: 24px;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }
        
        .score-card {
            background: #0f1117;
            border-radius: 24px;
            padding: 10px 20px;
            text-align: center;
            flex: 1;
        }
        
        .score-label {
            color: #5a6e8a;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .score-value {
            color: #2ecc71;
            font-size: 28px;
            font-weight: bold;
        }
        
        .best .score-value {
            color: #f39c12;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, minmax(80px, 100px));
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .cell {
            aspect-ratio: 1 / 1;
            background: #1a1f2a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s linear;
            color: #c0d0e6;
        }
        
        .cell:hover {
            background: #2a2f3e;
            transform: scale(0.98);
        }
        
        .settings {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        select, button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 0 #0b0e12;
        }
        
        select:active, button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        
        .status {
            text-align: center;
            color: #e67e22;
            font-weight: bold;
            font-size: 16px;
            background: #0f1117;
            padding: 8px;
            border-radius: 60px;
        }
        
        @media (max-width: 500px) {
            .board { grid-template-columns: repeat(3, minmax(70px, 85px)); gap: 8px; }
            .cell { font-size: 42px; }
            select, button { font-size: 11px; padding: 8px 12px; }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <h1>🎮 MEMUAR'S TIC-TAC-TOE</h1>
        
        <div class="score-board">
            <div class="score-card">
                <div class="score-label">🏆 ИГРОК X</div>
                <div class="score-value" id="playerXWins">0</div>
            </div>
            <div class="score-card best">
                <div class="score-label">🤖 ИГРОК O</div>
                <div class="score-value" id="playerOWins">0</div>
            </div>
        </div>
        
        <div class="board" id="board"></div>
        
        <div class="settings">
            <select id="modeSelect">
                <option value="bot">🤖 ПРОТИВ БОТА</option>
                <option value="twoPlayer">👥 ДВА ИГРОКА</option>
            </select>
            <select id="difficultySelect">
                <option value="easy">🟢 ЛЁГКИЙ</option>
                <option value="medium" selected>🟠 СРЕДНИЙ</option>
                <option value="hard">🔴 СЛОЖНЫЙ</option>
            </select>
            <select id="firstMoveSelect">
                <option value="player">👤 ИГРОК ПЕРВЫЙ</option>
                <option value="bot">🤖 БОТ ПЕРВЫЙ</option>
                <option value="random">🎲 СЛУЧАЙНО</option>
            </select>
        </div>
        
        <div class="controls">
            <button id="newGameBtn">🔄 НОВАЯ ИГРА</button>
            <button id="shareBtn">📤 ПОДЕЛИТЬСЯ</button>
        </div>
        <div class="status" id="gameStatus">⚡ НАЧНИ ИГРУ</div>
    </div>
</div>

<script src="https://yandex.ru/games/sdk/v2"></script>
<script>
    // ========== 1. ИНИЦИАЛИЗАЦИЯ ИГРЫ ==========
    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameEnded = false;
    let winsX = 0, winsO = 0;
    let currentMode = 'bot';
    let currentDifficulty = 'medium';
    let firstMove = 'player';
    
    // DOM элементы
    const boardEl = document.getElementById('board');
    const playerXWinsSpan = document.getElementById('playerXWins');
    const playerOWinsSpan = document.getElementById('playerOWins');
    const gameStatusSpan = document.getElementById('gameStatus');
    const modeSelect = document.getElementById('modeSelect');
    const difficultySelect = document.getElementById('difficultySelect');
    const firstMoveSelect = document.getElementById('firstMoveSelect');
    
    // ========== 2. ЗВУКИ (ПРОСТЫЕ И НАДЁЖНЫЕ) ==========
    let audioCtx = null;
    let soundsReady = false;
    
    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Сразу создаём базовые звуки
            soundsReady = true;
        } catch(e) { console.log('Audio not supported'); }
    }
    
    function playBeep(freq, duration, volume = 0.3) {
        if (!audioCtx || audioCtx.state !== 'running') return;
        try {
            const now = audioCtx.currentTime;
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.frequency.value = freq;
            gain.gain.value = volume;
            oscillator.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
            oscillator.stop(now + duration);
        } catch(e) {}
    }
    
    function playMoveSound() { playBeep(880, 0.12, 0.25); }
    function playWinSound() { playBeep(1047, 0.4, 0.4); setTimeout(() => playBeep(1319, 0.3, 0.35), 200); }
    function playLoseSound() { playBeep(440, 0.5, 0.3); setTimeout(() => playBeep(330, 0.4, 0.25), 250); }
    function playClickSound() { playBeep(660, 0.08, 0.2); }
    
    function unlockAudio() {
        if (audioCtx && audioCtx.state !== 'running') {
            audioCtx.resume().then(() => {
                console.log('Audio ready');
                playClickSound(); // тестовый звук
            }).catch(e => console.log('Audio resume error:', e));
        }
    }
    
    // ========== 3. ЛОГИКА ИГРЫ ==========
    function loadScores() {
        try {
            const savedX = localStorage.getItem('ttt_wins_x');
            const savedO = localStorage.getItem('ttt_wins_o');
            if (savedX) winsX = parseInt(savedX);
            if (savedO) winsO = parseInt(savedO);
            updateScoreDisplay();
        } catch(e) {}
    }
    
    function saveScores() {
        localStorage.setItem('ttt_wins_x', winsX);
        localStorage.setItem('ttt_wins_o', winsO);
        updateScoreDisplay();
    }
    
    function updateScoreDisplay() {
        playerXWinsSpan.innerText = winsX;
        playerOWinsSpan.innerText = winsO;
    }
    
    function checkWinner(boardArr) {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (let line of lines) {
            const [a,b,c] = line;
            if (boardArr[a] && boardArr[a] === boardArr[b] && boardArr[a] === boardArr[c]) return boardArr[a];
        }
        if (boardArr.every(cell => cell !== null)) return 'draw';
        return null;
    }
    
    function endGame(winner) {
        gameEnded = true;
        
        if (winner === 'X') {
            winsX++;
            saveScores();
            if (soundsReady && audioCtx?.state === 'running') playWinSound();
            gameStatusSpan.innerHTML = '🏆 ПОБЕДА! ИГРОК X 🏆';
        } else if (winner === 'O') {
            winsO++;
            saveScores();
            if (soundsReady && audioCtx?.state === 'running') playLoseSound();
            gameStatusSpan.innerHTML = currentMode === 'twoPlayer' ? '🏆 ПОБЕДА! ИГРОК O 🏆' : '💀 ПОРАЖЕНИЕ... БОТ ПОБЕДИЛ 💀';
        } else if (winner === 'draw') {
            gameStatusSpan.innerHTML = '🤝 НИЧЬЯ! 🤝';
        }
        
        setTimeout(() => {
            // Ничего не делаем, ждём новую игру
        }, 800);
    }
    
    function makeMove(index, isBot = false) {
        if (gameEnded) return false;
        if (board[index] !== null) return false;
        if (currentMode === 'bot' && !isBot && currentPlayer !== 'X') return false;
        if (currentMode === 'twoPlayer' && isBot) return false;
        
        board[index] = currentPlayer;
        if (soundsReady && audioCtx?.state === 'running') playMoveSound();
        renderBoard();
        
        const winner = checkWinner(board);
        if (winner) {
            endGame(winner);
            return true;
        }
        
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        updateStatus();
        
        if (currentMode === 'bot' && !gameEnded && currentPlayer === 'O') {
            setTimeout(() => botMove(), 200);
        }
        return true;
    }
    
    function getBestMove(boardArr, player) {
        const opponent = player === 'O' ? 'X' : 'O';
        
        for (let i = 0; i < 9; i++) {
            if (boardArr[i] === null) {
                boardArr[i] = player;
                if (checkWinner(boardArr) === player) { boardArr[i] = null; return i; }
                boardArr[i] = null;
            }
        }
        for (let i = 0; i < 9; i++) {
            if (boardArr[i] === null) {
                boardArr[i] = opponent;
                if (checkWinner(boardArr) === opponent) { boardArr[i] = null; return i; }
                boardArr[i] = null;
            }
        }
        let empty = [];
        for (let i = 0; i < 9; i++) if (boardArr[i] === null) empty.push(i);
        if (empty.length > 0) return empty[Math.floor(Math.random() * empty.length)];
        return -1;
    }
    
    function botMove() {
        if (gameEnded) return;
        if (currentPlayer !== 'O') return;
        
        let move = -1;
        let empty = [];
        for (let i = 0; i < 9; i++) if (board[i] === null) empty.push(i);
        if (empty.length === 0) return;
        
        if (currentDifficulty === 'easy') {
            move = empty[Math.floor(Math.random() * empty.length)];
        } else if (currentDifficulty === 'medium') {
            if (Math.random() < 0.7) move = getBestMove([...board], 'O');
            else move = empty[Math.floor(Math.random() * empty.length)];
        } else {
            move = getBestMove([...board], 'O');
        }
        
        if (move !== -1) makeMove(move, true);
    }
    
    function updateStatus() {
        if (gameEnded) return;
        if (currentMode === 'twoPlayer') {
            gameStatusSpan.innerHTML = currentPlayer === 'X' ? '❌ ХОД ИГРОКА X' : '⭕ ХОД ИГРОКА O';
        } else {
            gameStatusSpan.innerHTML = currentPlayer === 'X' ? '❌ ТВОЙ ХОД' : '🤖 ХОД БОТА...';
        }
    }
    
    function renderBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = board[i] || '';
            if (board[i] === 'X') cell.style.color = '#2ecc71';
            if (board[i] === 'O') cell.style.color = '#e74c3c';
            cell.addEventListener('click', (function(idx) {
                return function() { makeMove(idx, false); };
            })(i));
            boardEl.appendChild(cell);
        }
    }
    
    function newGame() {
        board = Array(9).fill(null);
        gameEnded = false;
        
        let first = firstMoveSelect.value;
        if (first === 'random') first = Math.random() < 0.5 ? 'player' : 'bot';
        
        if (currentMode === 'twoPlayer') {
            currentPlayer = 'X';
        } else {
            currentPlayer = first === 'player' ? 'X' : 'O';
        }
        
        renderBoard();
        updateStatus();
        
        if (currentMode === 'bot' && currentPlayer === 'O' && !gameEnded) {
            setTimeout(() => botMove(), 200);
        }
    }
    
    function shareGame() {
        if (soundsReady && audioCtx?.state === 'running') playClickSound();
        if (window.ysdk && window.ysdk.features?.Share) {
            window.ysdk.features.Share.share({ message: 'Сыграем в Крестики-нолики?' });
        } else {
            alert('Скопируй ссылку: https://memuarch1k.github.io/tic-tac-toe/');
        }
    }
    
    function applySettings() {
        if (soundsReady && audioCtx?.state === 'running') playClickSound();
        currentMode = modeSelect.value;
        currentDifficulty = difficultySelect.value;
        firstMove = firstMoveSelect.value;
        newGame();
    }
    
    // ========== 4. SDK (ЯНДЕКС) ==========
    window.initSDK = async function() {
        try {
            window.ysdk = await YaGames.init();
            const env = await window.ysdk.getEnvironment();
            if (window.ysdk.features.LoadingAPI) window.ysdk.features.LoadingAPI.ready();
            
            window.startGameplay = () => {
                if (window.ysdk.features.GameplayAPI && !gameEnded) {
                    window.ysdk.features.GameplayAPI.start();
                }
            };
            window.stopGameplay = () => {
                if (window.ysdk.features.GameplayAPI) window.ysdk.features.GameplayAPI.stop();
            };
            
            window.startGameplay();
        } catch(e) { console.error('SDK error:', e); }
    };
    
    // ========== 5. ЗАПУСК ВСЕГО ==========
    function setupEvents() {
        modeSelect.addEventListener('change', applySettings);
        difficultySelect.addEventListener('change', applySettings);
        firstMoveSelect.addEventListener('change', applySettings);
        document.getElementById('newGameBtn').addEventListener('click', () => { 
            if (soundsReady && audioCtx?.state === 'running') playClickSound(); 
            newGame(); 
        });
        document.getElementById('shareBtn').addEventListener('click', shareGame);
        
        // Разблокировка звука
        document.body.addEventListener('click', () => {
            initAudio();
            unlockAudio();
        });
        document.body.addEventListener('touchstart', () => {
            initAudio();
            unlockAudio();
        });
    }
    
    loadScores();
    initAudio();
    setupEvents();
    newGame();
    window.initSDK();
</script>
</body>
</html>
